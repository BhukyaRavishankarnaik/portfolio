<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Skills</title>
  <style>
    body {
  font-family: 'Poppins', sans-serif;
  background: #0d1117;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.header-img {
  width: 120px;
  display: block;
  margin: 0 auto 20px;
}

.circular-skills {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
}

.circular-skills h2 {
  width: 100%;
  font-size: 2rem;
  margin-bottom: 20px;
  color: #00ffff;
}

.circle {
  --size: 120px;
  width: var(--size);
  height: var(--size);
  background: conic-gradient(
    var(--color) calc(var(--percent) * 1%),
    #222 calc(var(--percent) * 1%)
  );
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: 0.3s ease;
}

.circle:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px var(--color);
}

.inner-circle {
  width: 85%;
  height: 85%;
  background: #0d1117;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.inner-circle span {
  font-weight: 600;
  font-size: 1rem;
}

.inner-circle small {
  color: #ccc;
  font-size: 0.8rem;
}

  </style>
</head>
<body>
  <img src="../assets/Skills.png" alt="Ravi">

  <section class="circular-skills">
    <h2>My Skills</h2>

    <div class="circle" style="--percent: 90; --color: #f16529;">
      <div class="inner-circle">
        <span>HTML</span>
        <small>80%</small>
      </div>
    </div>

    <div class="circle" style="--percent: 85; --color: #2965f1;">
      <div class="inner-circle">
        <span>CSS</span>
        <small>75%</small>
      </div>
    </div>

    <div class="circle" style="--percent: 75; --color: #f0db4f;">
      <div class="inner-circle">
        <span>JavaScript</span>
        <small>65%</small>
      </div>
    </div>

    <div class="circle" style="--percent: 90; --color: #004482;">
      <div class="inner-circle">
        <span>C</span>
        <small>80%</small>
      </div>
    </div>

    <div class="circle" style="--percent: 75; --color: #00599c;">
      <div class="inner-circle">
        <span>C++</span>
        <small>75%</small>
      </div>
    </div>

    <div class="circle" style="--percent: 80; --color: #306998;">
      <div class="inner-circle">
        <span>Python</span>
        <small>65%</small>
      </div>
    </div>
  </section>
</body>
</html>
